<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maieutic · 助产式对话</title>
  <style>
    :root {
      --ink: #1a1a1a;
      --ink-soft: #6b6b6b;
      --line: #e5e5e5;
      --paper: #ffffff;
      --paper-2: #fafafa;
      --paper-3: #f5f5f5;
      --accent: #5f7355;
      --accent-soft: rgba(95, 115, 85, 0.1);
      --accent-2: rgba(95, 115, 85, 0.05);
      --shadow: 0, 0, 0;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --serif: Georgia, serif;
      --mono: 'SF Mono', 'Fira Code', monospace;
    }

    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--sans); background: var(--paper-2); color: var(--ink); line-height: 1.6; }

    .header {
      max-width: 64rem;
      margin: 0 auto;
      padding: 1.5rem 1.5rem .5rem;
      border-bottom: 1px solid var(--line);
      background: var(--paper);
    }
    .header-inner { display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: var(--serif); font-size: 1.35rem; color: var(--ink); text-decoration: none; }
    .logo span { color: var(--accent); }
    .back-link { font-size: .85rem; color: var(--ink-soft); text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .main {
      max-width: 64rem;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .chat-area {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 160px);
      min-height: 500px;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: var(--paper);
      box-shadow: 0 4px 20px rgba(var(--shadow), 0.06);
    }

    .message-list {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
    }

    .message {
      margin-bottom: 1.5rem;
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-user { text-align: right; }
    .message-user .message-content {
      background: var(--accent);
      color: white;
      border-radius: 12px 12px 0 12px;
      display: inline-block;
      max-width: 80%;
    }

    .message-assistant .message-content {
      background: var(--paper-2);
      border: 1px solid var(--line);
      border-radius: 12px 12px 12px 0;
      max-width: 90%;
    }

    .message-content {
      padding: .9rem 1.1rem;
      font-size: .95rem;
      line-height: 1.7;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: .4rem;
      font-size: .78rem;
      color: var(--ink-soft);
    }

    .mode-badge {
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .15em .5em;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--paper-2);
    }

    .insight-card {
      margin-top: 1rem;
      padding: .9rem 1.1rem;
      background: linear-gradient(135deg, rgba(95, 115, 85, 0.08), rgba(95, 115, 85, 0.02));
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      font-size: .9rem;
      color: var(--ink);
      font-style: italic;
    }

    .beacon-card {
      margin-top: 1rem;
      padding: .9rem 1.1rem;
      background: var(--paper-3);
      border-radius: 8px;
      border: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      gap: .8rem;
    }
    .beacon-icon { font-size: 1.2rem; flex-shrink: 0; }
    .beacon-text { font-size: .9rem; color: var(--ink); }

    .markdown-body strong { color: var(--accent); font-weight: 600; }
    .markdown-body ul { margin: .5rem 0; padding-left: 1.5rem; }
    .markdown-body li { margin: .3rem 0; }
    .markdown-body blockquote {
      margin: .7rem 0;
      padding: .5rem .8rem;
      background: var(--paper-3);
      border-left: 3px solid var(--accent);
      border-radius: 0 4px 4px 0;
      font-style: italic;
      font-size: .9rem;
    }

    .loading-indicator {
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: .9rem 1.1rem;
      background: var(--paper-2);
      border: 1px solid var(--line);
      border-radius: 12px 12px 12px 0;
      max-width: 60%;
    }
    .loading-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .input-area {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--line);
      background: var(--paper);
    }

    .input-box {
      display: flex;
      gap: .75rem;
      align-items: flex-end;
    }

    .textarea-wrapper {
      flex: 1;
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 44px;
      max-height: 180px;
      padding: .8rem 1rem;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-family: inherit;
      font-size: .95rem;
      resize: none;
      background: var(--paper-2);
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(95, 115, 85, 0.1);
    }

    button {
      flex-shrink: 0;
      padding: .8rem 1.2rem;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .2s ease, transform .15s ease;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--ink-soft);
    }
    .empty-state h2 { font-family: var(--serif); font-size: 1.3rem; color: var(--ink); margin: 0 0 .5rem; }
    .empty-state ul { list-style: none; padding: 0; margin: 1rem 0 0; }
    .empty-state li { padding: .5rem; border-radius: 8px; cursor: pointer; transition: background .2s ease; }
    .empty-state li:hover { background: var(--paper-3); }

    .error-message {
      padding: .8rem 1rem;
      background: rgba(220, 38, 38, 0.08);
      border: 1px solid rgba(220, 38, 38, 0.2);
      border-radius: 8px;
      color: #dc2626;
      font-size: .85rem;
      margin-bottom: 1rem;
    }

    .copy-btn {
      font-size: .75rem;
      color: var(--ink-soft);
      background: none;
      border: 1px solid var(--line);
      padding: .3rem .7rem;
      border-radius: 6px;
      margin-top: .5rem;
    }
    .copy-btn:hover { color: var(--accent); border-color: var(--accent); }

    @media (max-width: 640px) {
      .header { padding: 1rem; }
      .main { padding: 1rem; }
      .chat-area { height: calc(100vh - 140px); }
      .message-user .message-content, .message-assistant .message-content { max-width: 95%; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">Maieutic <span>· 助产式对话</span></a>
      <a href="/" class="back-link">← 返回蛛网之上</a>
    </div>
  </header>

  <main class="main">
    <div class="chat-area">
      <div class="message-list" id="message-list">
        <div class="empty-state" id="empty-state">
          <h2>带一个真实问题来：</h2>
          <ul>
            <li onclick="sendExample('RAG 是什么？为什么最近都在说？')">RAG 是什么？为什么最近都在说？</li>
            <li onclick="sendExample('我想学剪辑，但不知道从哪里开始')">我想学剪辑，但不知道从哪里开始</li>
            <li onclick="sendExample('我最近什么都想学，但什么都开始不了')">我最近什么都想学，但什么都开始不了</li>
            <li onclick="sendExample('我想做一个 AI 公益项目，帮助乡村孩子')">我想做一个 AI 公益项目，帮助乡村孩子</li>
          </ul>
        </div>
      </div>

      <div class="input-area">
        <div class="error-message" id="error-message" style="display: none;"></div>
        <div class="input-box">
          <div class="textarea-wrapper">
            <textarea id="input" placeholder="输入你的问题，我会帮你梳理..." rows="1"></textarea>
          </div>
          <button id="send-btn" onclick="handleSend()">发送</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const SYSTEM_PROMPT = `你是一个 Maieutic 助产式对话助手。你的工作不是直接给答案，而是通过提问和引导，帮助用户自己理清问题、找到答案。

---

## 五种对话模式

根据用户输入，选择最贴切的模式：

### Knowledge
- 用户提问一个明确的知识点、概念或事实
- 直接给出准确、简洁的答案
- 使用 **加粗** 突出关键术语
- insight 和 beacon 必须为 null

### Exploration
- 用户表达学习、探索或成长的需求，但方向不明确
- 不直接给方案，而是提问澄清真正的目标和约束
- 引导用户发现自己真正想要的东西

### Reflection
- 用户表达情绪困扰、迷茫或需要梳理思路
- 先共情确认理解，再引导梳理
- 区分"情绪"和"问题"，不做鸡汤安慰
- 使用提问帮助用户自我洞察

### Creation
- 用户提出一个创作、产品或项目的想法
- 肯定创意方向，识别潜在盲区和未被验证的假设
- 提出挑战式问题，而非直接给方案

### Research
- 用户需要深入调研某个主题、领域或问题
- 明确知识边界，按逻辑分类整理信息
- 指出关键趋势和信息缺口

---

## 格式规范

回复风格：**克制、直接、共学、不说教**。像一个聪明但克制的朋友。

Markdown 格式：
- 用 **加粗** 标记核心观点和关键词（每个回复2-4处即可）
- 用 - 列表来列举平行选项或要点
- 用 > 引用来突出重要洞察或原则
- 段落之间用空行分隔，不要堆砌内容

---

## Insight / Beacon 触发规则

**核心原则：不要为了"完整"而强行输出。**

- **insight**：只有当本轮对话产生了真正的认知推进时才写。
- **beacon**：只有当用户明确需要一个具体下一步时才写。
- **Knowledge 模式**：insight 和 beacon 必须为 null。
- **多数情况下**：insight 和 beacon 都应该为 null。

输出格式（严格 JSON，不要在 JSON 外写任何文字）：
{"mode":"Knowledge","reply":"回复内容（可用markdown）","insight":null,"beacon":null}

mode 只能是：Knowledge, Exploration, Reflection, Creation, Research

用户语言是中文时，全部内容用中文回复。`;

    let messages = [];
    const API_URL = 'https://maieutic-proxy.tiaozhuxiansheng.workers.dev/api/chat';

    function unescapeJsonString(value) {
      return value
        .replace(/\\\\n/g, '\n')
        .replace(/\\\\r/g, '\r')
        .replace(/\\\\t/g, '\t')
        .replace(/\\\\"/g, '"')
        .replace(/\\\\'/g, "'")
        .replace(/\\\\\\\\/g, '\\')
        .replace(/\\\\`/g, '`');
    }

    function fixUnescapedQuotes(jsonStr) {
      let result = '';
      let inString = false;
      let escape = false;

      for (let i = 0; i < jsonStr.length; i++) {
        const char = jsonStr[i];

        if (escape) {
          result += char;
          escape = false;
          continue;
        }

        if (char === '\\') {
          result += char;
          escape = true;
          continue;
        }

        if (char === '"') {
          if (inString) {
            const nextChar = jsonStr[i + 1];
            if (nextChar !== ',' && nextChar !== '}' && nextChar !== ']') {
              result += '\\"';
              continue;
            }
          }
          inString = !inString;
        }

        result += char;
      }

      return result;
    }

    function extractFieldValue(text, fieldName) {
      const regex = new RegExp(`"${fieldName}"\\s*:\\s*"([^"]*)"`);
      const match = text.match(regex);
      return match ? match[1] : null;
    }

    function parseResponse(text) {
      let data = null;

      try {
        data = JSON.parse(text);
      } catch {}

      if (!data) {
        text = fixUnescapedQuotes(text);
        try {
          data = JSON.parse(text);
        } catch {}
      }

      if (!data) {
        const mode = extractFieldValue(text, 'mode') || 'Reflection';
        const reply = extractFieldValue(text, 'reply') || text;
        const insight = extractFieldValue(text, 'insight');
        const beacon = extractFieldValue(text, 'beacon');
        return { mode, reply, insight, beacon };
      }

      return {
        mode: data.mode || 'Reflection',
        reply: unescapeJsonString(data.reply || ''),
        insight: data.insight ? unescapeJsonString(data.insight) : null,
        beacon: data.beacon ? unescapeJsonString(data.beacon) : null
      };
    }

    function renderMarkdown(text) {
      text = text || '';
      text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/^- (.+)$/gm, '<li>$1</li>');
      text = text.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
      text = text.replace(/<\/ul>\n<ul>/g, '');
      text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
      text = text.replace(/\n/g, '<br>');
      return text;
    }

    function scrollToBottom() {
      const list = document.getElementById('message-list');
      list.scrollTop = list.scrollHeight;
    }

    function addMessage(role, content, result) {
      const list = document.getElementById('message-list');
      const empty = document.getElementById('empty-state');
      if (empty) empty.style.display = 'none';

      const message = document.createElement('div');
      message.className = `message message-${role}`;
      message.id = `msg-${Date.now()}`;

      if (role === 'user') {
        message.innerHTML = `
          <div class="message-content">${content}</div>
        `;
      } else {
        let html = `
          <div class="message-header">
            <span>Maieutic</span>
            <span class="mode-badge">${result?.mode || ''}</span>
          </div>
          <div class="message-content markdown-body">${renderMarkdown(content)}</div>
        `;

        if (result?.insight) {
          html += `<div class="insight-card">💡 ${result.insight}</div>`;
        }
        if (result?.beacon) {
          html += `<div class="beacon-card"><span class="beacon-icon">🌱</span><span class="beacon-text">${result.beacon}</span></div>`;
        }

        html += `<button class="copy-btn" onclick="copyText('${content.replace(/'/g, "\\'")}')">复制</button>`;
        message.innerHTML = html;
      }

      list.appendChild(message);
      messages.push({ role, content, result });
      scrollToBottom();
    }

    function showLoading() {
      const list = document.getElementById('message-list');
      const empty = document.getElementById('empty-state');
      if (empty) empty.style.display = 'none';

      const loading = document.createElement('div');
      loading.className = 'message message-assistant';
      loading.id = 'loading-indicator';
      loading.innerHTML = `
        <div class="message-header">
          <span>Maieutic</span>
          <span class="mode-badge">思考中</span>
        </div>
        <div class="loading-indicator">
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
        </div>
      `;
      list.appendChild(loading);
      scrollToBottom();
    }

    function removeLoading() {
      const loading = document.getElementById('loading-indicator');
      if (loading) loading.remove();
    }

    function showError(message) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      setTimeout(() => {
        errorDiv.style.display = 'none';
      }, 5000);
    }

    function handleSend() {
      const input = document.getElementById('input');
      const btn = document.getElementById('send-btn');
      const content = input.value.trim();

      if (!content) return;

      input.value = '';
      input.style.height = '44px';
      btn.disabled = true;

      addMessage('user', content);
      showLoading();

      const history = messages.slice(-8);
      const formattedHistory = history.map(m => ({
        role: m.role,
        content: m.content
      }));

      const requestBody = {
        model: 'anthropic/claude-opus-4.8',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...formattedHistory,
          { role: 'user', content: content }
        ]
      };

      fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(requestBody)
      })
      .then(response => {
        if (!response.ok) {
          throw new Error(`Request failed: ${response.status}`);
        }
        return response.json();
      })
      .then(data => {
        removeLoading();
        const aiContent = data?.choices?.[0]?.message?.content || '';
        const result = parseResponse(aiContent);
        addMessage('assistant', result.reply, result);
      })
      .catch(error => {
        removeLoading();
        showError('对话暂时不可用，请稍后再试。');
        console.error('API Error:', error);
      })
      .finally(() => {
        btn.disabled = false;
      });
    }

    function sendExample(text) {
      document.getElementById('input').value = text;
      handleSend();
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        const original = btn.textContent;
        btn.textContent = '已复制';
        setTimeout(() => { btn.textContent = original; }, 2000);
      });
    }

    document.getElementById('input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });

    document.getElementById('input').addEventListener('input', (e) => {
      e.target.style.height = 'auto';
      e.target.style.height = Math.min(e.target.scrollHeight, 180) + 'px';
    });
  </script>
</body>
</html>
