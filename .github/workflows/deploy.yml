name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:        # 手动触发
  repository_dispatch:      # knowledge-base 更新后远程触发（type: kb-updated）
    types: [kb-updated]
  schedule:
    - cron: '0 */6 * * *'   # 每 6 小时兜底同步一次

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build          # sync(克隆 knowledge-base) + astro build + pagefind
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
