name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:        # 手动触发
  repository_dispatch:      # knowledge-base 更新后远程触发（type: kb-updated）
    types: [kb-updated]
  schedule:
    - cron: '0 */6 * * *'   # 每 6 小时兜底同步一次

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build          # sync(克隆 knowledge-base) + astro build + pagefind
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  # 部署到香港轻量服务器（国内访问主入口，根路径 + 自定义域名）
  deploy-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /
          SITE_URL: https://tiaozhuxiansheng.com
      - name: Rsync dist 到香港服务器
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HK_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 43.128.2.172 >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes" dist/ root@43.128.2.172:/var/www/tiaozhuxiansheng/
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes root@43.128.2.172 'chown -R www-data:www-data /var/www/tiaozhuxiansheng'
