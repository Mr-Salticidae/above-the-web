name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:        # 手动触发
  repository_dispatch:      # knowledge-base 更新后远程触发（type: kb-updated）
    types: [kb-updated]
  schedule:
    - cron: '0 */6 * * *'   # 每 6 小时兜底同步一次

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build          # sync(克隆 knowledge-base) + astro build + pagefind
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  # 部署到香港轻量服务器（国内访问主入口，根路径 + 自定义域名）
  deploy-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /
          SITE_URL: https://tiaozhuxiansheng.com
      # 从 desk-pond 最新 Release 抓 Windows 安装包，随 dist 一起 rsync 到香港服务器，
      # 让主页能国内直连直接下载（不入 git、不进 Pages 产物——Pages 单文件 100MB 上限）。
      # 统一命名为稳定文件名，主页链接无需随版本改动；每次部署自动同步到最新版。
      - name: 拉取 desk-pond 最新 Release 安装包到 dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist/desk-pond/download
          asset_url=$(curl -sL -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/Mr-Salticidae/desk-pond/releases/latest \
            | grep -o '"browser_download_url": *"[^"]*\.exe"' | head -1 | sed -E 's/.*"(https[^"]+)".*/\1/')
          echo "下载: $asset_url"
          test -n "$asset_url"
          curl -fL "$asset_url" -o dist/desk-pond/download/DeskPond-Windows.exe
          ls -la dist/desk-pond/download/
      # 《镜像自我·人生预演》手机报告页镜像到 /mlr/：github.io 在大陆移动网络常不可达，
      # BW 展台扫码链路改走本域名（展台 config.json 的 reportBase 指向 /mlr/）。
      # 产物源头仍是 preview 仓库（主仓 deploy-preview.ps1 推送），这里只做镜像，
      # push / 手动触发 / 每 6 小时定时均会同步最新版。不进 Pages 产物（单文件 100MB 上限）。
      - name: 镜像 mirror-life-rehearsal 预览站到 dist/mlr
        run: |
          git clone --depth 1 https://github.com/Mr-Salticidae/mirror-life-rehearsal-preview.git /tmp/mlr-preview
          rm -rf /tmp/mlr-preview/.git
          mkdir -p dist/mlr
          cp -a /tmp/mlr-preview/. dist/mlr/

      - name: Rsync dist 到香港服务器
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HK_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 43.128.2.172 >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes" dist/ root@43.128.2.172:/var/www/tiaozhuxiansheng/
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes root@43.128.2.172 'chown -R www-data:www-data /var/www/tiaozhuxiansheng'
