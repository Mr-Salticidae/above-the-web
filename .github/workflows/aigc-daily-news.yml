# AIGC 每日快讯：云端定时搜集新闻并更新 /news/ 板块。
# 每天早晨自动运行（多个错峰 cron 互为重试），不依赖本地电脑开机。
# 需要仓库 secret：ANTHROPIC_API_KEY。
# 注：GITHUB_TOKEN 的 push 不会级联触发 deploy.yml 的 on:push，
#     所以本 workflow 在 push 后用 workflow_dispatch 主动触发一次部署。
name: AIGC Daily News

on:
  schedule:
    # GitHub schedule 在高峰时段（尤其整点/半点）实测延迟 3-4 小时甚至丢弃
    # （2026-07-04/05 的 01:30 cron 均 13:00+ 北京时间才触发）。
    # 对策：错峰分钟数 + 一天 4 枪互为重试；"当日期刊已存在"守卫保证幂等（空跑仅 9 秒）。
    - cron: '47 22 * * *' # 06:47 北京时间（前一天 UTC）
    - cron: '17 0 * * *'  # 08:17 北京时间
    - cron: '43 1 * * *'  # 09:43 北京时间
    - cron: '23 3 * * *'  # 11:23 北京时间（兜底）
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  id-token: write # claude-code-action 通过 OIDC 换取 token，缺这个会在 Claude 步骤直接失败

concurrency:
  group: aigc-daily-news
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # 当日期刊已存在（比如本地已手动更新过）则跳过，避免重复
      - name: 检查当日期刊是否已存在
        id: check
        run: |
          TODAY=$(TZ=Asia/Shanghai date +%F)
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          if [ -f "src/data/news/$TODAY.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "当日期刊 $TODAY 已存在，跳过本次更新"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        if: steps.check.outputs.exists == 'false'
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        if: steps.check.outputs.exists == 'false'

      - name: Claude 搜集并撰写当日快讯
        if: steps.check.outputs.exists == 'false'
        uses: anthropics/claude-code-action@v1
        env:
          # API 经中转站（Bedrock 转售）访问；该中转不支持服务端 WebSearch 工具，
          # 搜索改用 curl 抓 Google News RSS / 官方页面（见 prompt）
          ANTHROPIC_BASE_URL: https://api.ofox.ai/anthropic
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # 仓库未安装 Claude GitHub App，显式传 GITHUB_TOKEN 跳过 App 的 OIDC 换 token 流程
          github_token: ${{ github.token }}
          prompt: |
            你负责更新「蛛网之上」站点的「AIGC 每日快讯」板块。用中文工作，专有名词保留英文。
            今天的日期（北京时间）：${{ steps.check.outputs.today }}

            ## 目标
            搜集过去 24 小时 AIGC / 生成式 AI 领域值得创作者关注的新闻，写入
            src/data/news/${{ steps.check.outputs.today }}.json（UTF-8 无 BOM）。
            只创建这一个文件，不改动其他任何文件，不要执行 git commit/push（由后续流程处理）。

            ## 搜集新闻
            注意：本环境的 WebSearch 工具不可用（API 中转不支持服务端搜索，调用只会浪费回合，禁止尝试），
            用 Bash 的 curl 抓 Google News RSS 多角度搜索（6-10 次），再用 curl 或 WebFetch 核实原文链接。
            RSS 端点格式：https://news.google.com/rss/search?q=<关键词URL编码>+when:2d&hl=en-US&gl=US&ceid=US:en
            建议关键词组合：
            - 通用："generative AI"、"AI video model"、"AI image model"
            - 创作工具：Midjourney / Runway / Kling AI / Sora / Suno / ElevenLabs / Pika / Luma / Hailuo 更新
            - 大厂：OpenAI / Anthropic / Google DeepMind / Meta AI announcement
            - 中国厂商：Kuaishou Kling、ByteDance Seedance、Alibaba Qwen Wan、Tencent Hunyuan、MiniMax
            也可以直接 curl 官方渠道核实：blog.google、openai.com/news、anthropic.com/news、
            runwayml.com、各工具官方 changelog 等。
            RSS 里 Google News 的跳转链接（news.google.com/rss/articles/…）不要直接用作 url 字段，
            要写文章的真实原始 URL（RSS item 的 source 或抓原文确认）。

            成本纪律（重要，2026-07-06 曾因跑满回合上限空手而归）：
            - 先写文件，再优化：凑足 5 条合格新闻就【立即】写出 JSON 文件，之后如有余力再补充或替换条目。
              宁可先交一份 5 条的合格稿，也不要把写文件拖到最后。
            - RSS 搜索控制在 10 次以内；不要为凑满条数反复换关键词、爬搜索引擎结果页（DuckDuckGo/Bing 等）；
            - 每条新闻的 URL 核实最多 1 次请求，不要逐条深挖发布时间等细节。

            选稿标准：6-10 条，全部真实可溯源（必须有真实 URL，禁止编造）；
            优先级：创作工具更新（图像/视频/音乐模型）> 大模型厂商重要发布 > 行业/政策大事；
            只收最近 48 小时内的新闻，且不与已有期刊（src/data/news/ 下前几天的 JSON）重复；
            宁缺毋滥但至少 5 条；如实在凑不够 5 条有效新闻，则不要写文件，直接结束并说明原因。

            ## 期刊 JSON 格式（详见 src/lib/news.mjs 头部注释，写作口吻参考已有期刊文件）
            {
              "date": "YYYY-MM-DD",
              "headline": "一句话概括当天主线，编辑口吻，≤40字",
              "items": [
                {
                  "title": "中文标题，专有名词保留英文，≤30字",
                  "summary": "2-3 句：发生了什么 + 对创作者意味着什么",
                  "category": "模型|工具|行业|研究|政策 之一",
                  "source": "来源名称",
                  "url": "真实 URL",
                  "featured": true
                }
              ]
            }
            featured 只给最重要的 1-2 条。面向中文 AIGC 创作者：克制、划重点、不做标题党。

            写完后可运行 npm run build 自检；若构建报错，修复 JSON 后重试。
          # allowedTools 注意：curl 抓 RSS 后必然接管道/文本处理，组合命令要求每段都在白名单内，
          # 只放行 curl 会导致大量权限拒绝、空手收场（2026-07-04 首跑 12 次拒绝实测）
          claude_args: |
            --model anthropic/claude-sonnet-5
            --max-turns 120
            --allowedTools "WebFetch,Read,Glob,Grep,Write,Bash(curl:*),Bash(node:*),Bash(jq:*),Bash(grep:*),Bash(sed:*),Bash(awk:*),Bash(head:*),Bash(tail:*),Bash(sort:*),Bash(uniq:*),Bash(wc:*),Bash(cat:*),Bash(ls:*),Bash(echo:*),Bash(mkdir:*),Bash(python3:*),Bash(npm run build)"

      # Claude 步骤 is_error 时真正的报错只在 runner 的执行输出 JSON 里，
      # 工作流日志看不到——这里打出末尾部分供排障（API 报错都在最后一条消息）
      - name: 诊断：打印 Claude 执行输出末尾
        if: always() && steps.check.outputs.exists == 'false'
        run: |
          F="$RUNNER_TEMP/claude-execution-output.json"
          if [ -f "$F" ]; then tail -c 4000 "$F"; else echo "无执行输出文件"; fi

      - name: 验证、提交并触发部署
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY='${{ steps.check.outputs.today }}'
          FILE="src/data/news/$TODAY.json"
          if [ ! -f "$FILE" ]; then
            echo "Claude 未产出当日期刊（可能有效新闻不足 5 条），本次不更新"
            exit 0
          fi
          # 条数下限校验
          node -e "const d=require('./$FILE'); if(!Array.isArray(d.items)||d.items.length<5){console.error('items 少于 5 条');process.exit(1)}"
          # 构建验证：JSON 损坏时 news.mjs 会静默跳过该期，因此必须确认当日页面真的生成了
          npm run build
          test -f "dist/news/$TODAY/index.html"
          # 期号 = news 目录下 JSON 总数（当日文件按日期排序必然是最后一个）
          N=$(ls src/data/news/*.json | wc -l)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "news(快讯): 第 $N 期 $TODAY" -m "Co-Authored-By: Claude <noreply@anthropic.com>"
          # npm run build 里 stamp-assets 会原地改写 public/*/index.html（跟踪文件），
          # 不清掉的话 pull --rebase 会因脏工作区失败（2026-07-04 实测丢过一期提交）
          git checkout -- .
          git pull --rebase origin main
          git push
          # GITHUB_TOKEN 的 push 不触发 deploy.yml 的 on:push，这里手动触发部署
          gh workflow run deploy.yml --ref main
